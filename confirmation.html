<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Complete | Grants.gov Official</title>
    
    <!-- Official USWDS Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ===== OFFICIAL U.S. GOVERNMENT STYLING ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f0f0;
            color: #1b1b1b;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === USA Flag Banner === */
        .usa-banner {
            background-color: #f0f0f0;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid #d9d9d9;
        }

        .banner-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .usa-flag {
            width: 20px;
            height: 20px;
            background: linear-gradient(180deg, #b22234 0%, #b22234 50%, #ffffff 50%, #ffffff 100%);
            border: 1px solid #0a0a0a;
        }

        .banner-text strong {
            font-weight: 700;
        }

        .dot-gov {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dot-gov span {
            background: #1b1b1b;
            color: white;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
        }

        /* === Header === */
        .usa-header {
            background: #112f4e;
            color: white;
            border-bottom: 4px solid #b22234;
        }

        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .official-seal {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #112f4e;
            font-size: 24px;
            border: 2px solid #b22234;
        }

        .agency-name h1 {
            font-family: 'Merriweather', serif;
            font-size: 22px;
            font-weight: 700;
            color: white;
        }

        .agency-name .gov-domain {
            font-size: 12px;
            color: #ffd700;
            display: block;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }

        .user-info i {
            color: #ffd700;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* === Progress Bar === */
        .progress-section {
            background: white;
            border-bottom: 1px solid #d9d9d9;
        }

        .progress-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 30px;
        }

        .progress-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: #e5e5e5;
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            text-align: center;
            flex: 1;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-weight: 700;
            color: #5c5c5c;
        }

        .step.completed .step-circle {
            background: #b22234;
            border-color: #b22234;
            color: white;
        }

        .step.active .step-circle {
            background: #112f4e;
            border-color: #112f4e;
            color: white;
        }

        .step-label {
            font-size: 14px;
            font-weight: 600;
        }

        /* === Main Container === */
        .main-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* === Confirmation Card === */
        .confirmation-card {
            background: white;
            border: 1px solid #d9d9d9;
            padding: 50px;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 30px;
            border: 4px solid #ffd700;
        }

        .confirmation-card h2 {
            font-family: 'Merriweather', serif;
            font-size: 32px;
            color: #112f4e;
            margin-bottom: 15px;
        }

        .confirmation-card .subtitle {
            font-size: 18px;
            color: #5c5c5c;
            margin-bottom: 40px;
        }

        /* === Application ID === */
        .app-id-box {
            background: #f8f8f8;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 4px solid #b22234;
            text-align: left;
        }

        .app-id-box .label {
            font-size: 14px;
            color: #5c5c5c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .app-id-box .id-number {
            font-family: 'Merriweather', serif;
            font-size: 36px;
            font-weight: 700;
            color: #112f4e;
            margin: 10px 0;
        }

        .app-id-box .date {
            font-size: 14px;
            color: #5c5c5c;
        }

        /* === Receipt Grid === */
        .receipt-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
            text-align: left;
        }

        .receipt-item {
            background: #f8f8f8;
            padding: 20px;
        }

        .receipt-item.full-width {
            grid-column: span 2;
        }

        .receipt-item .label {
            font-size: 12px;
            color: #5c5c5c;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .receipt-item .value {
            font-size: 18px;
            font-weight: 600;
            color: #112f4e;
        }

        .receipt-item .value.highlight {
            color: #b22234;
            font-size: 24px;
        }

        /* === Bank Info Box === */
        .bank-info {
            background: linear-gradient(145deg, #112f4e, #1e4a7a);
            color: white;
            padding: 30px;
            margin: 40px 0;
            border-radius: 8px;
        }

        .bank-info h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .bank-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            text-align: left;
        }

        .bank-details .label {
            font-size: 12px;
            opacity: 0.7;
        }

        .bank-details .value {
            font-size: 16px;
            font-weight: 600;
        }

        .amount-deposit {
            font-size: 32px;
            font-weight: 700;
            color: #ffd700;
            margin-top: 20px;
        }

        /* === Action Buttons === */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .btn-primary {
            padding: 16px;
            background: #b22234;
            color: white;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #8b1a1a;
        }

        .btn-secondary {
            padding: 16px;
            background: transparent;
            color: #112f4e;
            border: 2px solid #112f4e;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #112f4e;
            color: white;
        }

        .btn-outline {
            padding: 14px;
            background: transparent;
            color: #5c5c5c;
            border: 1px solid #d9d9d9;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: #f8f8f8;
        }

        /* === Footer Links === */
        .footer-links-compact {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }

        .footer-links-compact a {
            color: #5c5c5c;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-links-compact a:hover {
            color: #112f4e;
            text-decoration: underline;
        }

        /* === Print Section === */
        @media print {
            .no-print {
                display: none;
            }
            body {
                background: white;
            }
            .confirmation-card {
                box-shadow: none;
                border: none;
            }
        }

        /* === Footer === */
        .usa-footer {
            background: #112f4e;
            color: white;
            margin-top: 60px;
            border-top: 4px solid #b22234;
        }

        .footer-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .footer-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #ffd700;
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            .receipt-grid {
                grid-template-columns: 1fr;
            }
            .receipt-item.full-width {
                grid-column: span 1;
            }
            .bank-details {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                grid-template-columns: 1fr;
            }
            .confirmation-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- USA BANNER -->
    <div class="usa-banner">
        <div class="banner-content">
            <div class="usa-flag"></div>
            <div class="banner-text">
                <strong>An official website of the United States government</strong>
            </div>
            <div class="dot-gov">
                <i class="fas fa-lock"></i> .gov
                <span>Official</span>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="usa-header">
        <div class="header-content">
            <div class="logo-area">
                <div class="official-seal">
                    <i class="fas fa-eagle"></i>
                </div>
                <div class="agency-name">
                    <h1>Grants.gov</h1>
                    <span class="gov-domain">U.S. Department of Treasury</span>
                </div>
            </div>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Loading...</span>
                <button class="logout-btn" onclick="logout()">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- PROGRESS BAR -->
    <div class="progress-section no-print">
        <div class="progress-container">
            <div class="progress-steps">
                <div class="step completed">
                    <div class="step-circle">✓</div>
                    <div class="step-label">Application</div>
                </div>
                <div class="step completed">
                    <div class="step-circle">✓</div>
                    <div class="step-label">Payment</div>
                </div>
                <div class="step completed">
                    <div class="step-circle">✓</div>
                    <div class="step-label">Account</div>
                </div>
                <div class="step active">
                    <div class="step-circle">4</div>
                    <div class="step-label">Confirmation</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="main-container" id="mainContent">
        <!-- This will be populated by JavaScript -->
    </main>

    <!-- FOOTER -->
    <footer class="usa-footer no-print">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Accessibility</a>
                <a href="#">FOIA</a>
                <a href="#">Contact Us</a>
            </div>
            <div>
                <i class="fas fa-flag-usa" style="color: #b22234; margin-right: 8px;"></i>
                U.S. Department of Treasury · An official website of the United States government
            </div>
        </div>
    </footer>

    <script>
        // ===== CHECK LOGIN AND APPLICATION STATUS =====
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('grantsLoggedIn') === 'true';
            const userName = localStorage.getItem('grantsName');
            
            if (!isLoggedIn) {
                window.location.href = 'auth.html';
                return;
            }
            
            document.getElementById('userName').textContent = userName || 'Applicant';
            
            // Load all data
            const appData = JSON.parse(localStorage.getItem('applicationData') || '{}');
            const accountDetails = JSON.parse(localStorage.getItem('accountDetails') || '{}');
            const paymentMethod = localStorage.getItem('paymentMethod') || 'card';
            const appId = localStorage.getItem('applicationId') || 'GR-' + Math.floor(Math.random() * 1000000);
            
            if (!appData.firstName || !accountDetails.accountName) {
                showIncomplete();
                return;
            }
            
            showConfirmation(appData, accountDetails, paymentMethod, appId);
        });

        // ===== LOGOUT FUNCTION =====
        function logout() {
            localStorage.removeItem('grantsLoggedIn');
            localStorage.removeItem('grantsName');
            localStorage.removeItem('grantsEmail');
            window.location.href = 'auth.html';
        }

        // ===== SHOW INCOMPLETE =====
        function showIncomplete() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="confirmation-card">
                    <i class="fas fa-exclamation-circle" style="font-size: 60px; color: #b22234; margin-bottom: 20px;"></i>
                    <h2>Application Incomplete</h2>
                    <p style="color: #5c5c5c; margin-bottom: 30px;">Please complete all steps before viewing confirmation.</p>
                    <button class="btn-primary" onclick="window.location.href='index.html'" style="width: auto; padding: 12px 40px;">
                        Return to Home
                    </button>
                </div>
            `;
        }

        // ===== SHOW CONFIRMATION =====
        function showConfirmation(appData, accountDetails, paymentMethod, appId) {
            const grantAmount = parseInt(appData.grantAmount || '0').toLocaleString();
            const processingFee = parseInt(appData.processingFee || '0').toLocaleString();
            
            // Format payment method for display
            let paymentMethodDisplay = 'Credit Card';
            if (paymentMethod === 'paypal') paymentMethodDisplay = 'PayPal';
            if (paymentMethod === 'bank') paymentMethodDisplay = 'Bank Transfer';
            
            // Format date
            const today = new Date();
            const formattedDate = today.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="confirmation-card">
                    <!-- SUCCESS ICON -->
                    <div class="success-icon">
                        <i class="fas fa-check"></i>
                    </div>
                    
                    <h2>Application Complete!</h2>
                    <p class="subtitle">Your grant application has been successfully submitted and approved.</p>
                    
                    <!-- APPLICATION ID -->
                    <div class="app-id-box">
                        <div class="label">Application ID</div>
                        <div class="id-number">${appId}</div>
                        <div class="date">Submitted: ${formattedDate}</div>
                    </div>
                    
                    <!-- RECEIPT GRID -->
                    <div class="receipt-grid">
                        <div class="receipt-item">
                            <div class="label">Applicant Name</div>
                            <div class="value">${appData.fullName || appData.firstName + ' ' + appData.lastName}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">Email Address</div>
                            <div class="value">${appData.email}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">Grant Program</div>
                            <div class="value">${appData.grantName}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">CFDA Number</div>
                            <div class="value">${Math.floor(Math.random() * 100)}.${Math.floor(Math.random() * 1000)}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">Grant Amount</div>
                            <div class="value highlight">$${grantAmount}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">Processing Fee Paid</div>
                            <div class="value">$${processingFee}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">Payment Method</div>
                            <div class="value">${paymentMethodDisplay}</div>
                        </div>
                        <div class="receipt-item">
                            <div class="label">Payment Date</div>
                            <div class="value">${formattedDate}</div>
                        </div>
                        <div class="receipt-item full-width">
                            <div class="label">Purpose of Funds</div>
                            <div class="value">${appData.purpose || 'Not specified'}</div>
                        </div>
                    </div>
                    
                    <!-- BANK INFO -->
                    <div class="bank-info">
                        <h3><i class="fas fa-university"></i> Funds Deposit Information</h3>
                        <div class="bank-details">
                            <div>
                                <div class="label">Bank Name</div>
                                <div class="value">${accountDetails.bankName}</div>
                            </div>
                            <div>
                                <div class="label">Account Holder</div>
                                <div class="value">${accountDetails.accountName}</div>
                            </div>
                            <div>
                                <div class="label">Account Type</div>
                                <div class="value">${accountDetails.accountType || 'Checking Account'}</div>
                            </div>
                            <div>
                                <div class="label">Account Number</div>
                                <div class="value">••••${accountDetails.accountNumber || '1234'}</div>
                            </div>
                        </div>
                        <div class="amount-deposit">
                            $${grantAmount}
                        </div>
                        <p style="margin-top: 15px; font-size: 14px; opacity: 0.8;">
                            <i class="fas fa-clock"></i> Expected deposit: 24-48 business hours
                        </p>
                    </div>
                    
                    <!-- ACTION BUTTONS -->
                    <div class="action-buttons no-print">
                        <button class="btn-primary" onclick="window.print()">
                            <i class="fas fa-print"></i> Print Receipt
                        </button>
                        <button class="btn-primary" onclick="downloadReceipt()">
                            <i class="fas fa-download"></i> Download PDF
                        </button>
                    </div>
                    
                    <div class="action-buttons no-print" style="margin-top: 0;">
                        <button class="btn-secondary" onclick="window.location.href='index.html'">
                            <i class="fas fa-home"></i> Return to Home
                        </button>
                        <button class="btn-secondary" onclick="startNewApplication()">
                            <i class="fas fa-plus"></i> New Application
                        </button>
                    </div>
                    
                    <!-- FOOTER LINKS -->
                    <div class="footer-links-compact no-print">
                        <a href="#" onclick="window.open('https://www.grants.gov')">Grants.gov</a>
                        <a href="#" onclick="alert('Support: 1-877-696-6775')">Contact Support</a>
                        <a href="#" onclick="alert('Your confirmation has been emailed to ' + '${appData.email}')">Email Receipt</a>
                    </div>
                    
                    <p style="margin-top: 30px; font-size: 12px; color: #5c5c5c; border-top: 1px solid #e5e5e5; padding-top: 20px;">
                        <i class="fas fa-balance-scale"></i> This is an official U.S. government document. Keep for your records.
                    </p>
                </div>
            `;
        }

        // ===== DOWNLOAD RECEIPT (simulated) =====
        function downloadReceipt() {
            alert('Receipt download started. The file has been saved to your downloads folder.');
        }

        // ===== START NEW APPLICATION =====
        function startNewApplication() {
            if (confirm('Start a new application? This will clear your current session data.')) {
                // Clear application data but keep login
                localStorage.removeItem('selectedGrant');
                localStorage.removeItem('grantAmount');
                localStorage.removeItem('processingFee');
                localStorage.removeItem('applicationData');
                localStorage.removeItem('applicationStep');
                localStorage.removeItem('paymentComplete');
                localStorage.removeItem('paymentMethod');
                localStorage.removeItem('paymentDate');
                localStorage.removeItem('accountDetails');
                localStorage.removeItem('applicationId');
                
                window.location.href = 'index.html';
            }
        }

        // ===== PRINT STYLES =====
        const style = document.createElement('style');
        style.textContent = `
            @media print {
                .no-print {
                    display: none !important;
                }
                body {
                    background: white;
                    padding: 20px;
                }
                .confirmation-card {
                    box-shadow: none;
                    border: 1px solid #ccc;
                    padding: 30px;
                }
                .success-icon {
                    background: #10b981 !important;
                    -webkit-print-color-adjust: exact;
                    print-color-adjust: exact;
                }
                .bank-info {
                    background: #112f4e !important;
                    -webkit-print-color-adjust: exact;
                    print-color-adjust: exact;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
